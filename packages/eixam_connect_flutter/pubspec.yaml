name: eixam_connect_flutter
description: Partner-facing Flutter SDK for integrating EIXAM SOS, device, telemetry, and diagnostics flows into host apps.
version: 0.1.0
homepage: https://developer.eixam.example/sdk/flutter
repository: https://github.com/eixam/eixam-connect-sdk
issue_tracker: https://github.com/eixam/eixam-connect-sdk/issues
publish_to: 'none'
environment:
  sdk: '>=3.4.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  eixam_connect_core:
    path: ../eixam_connect_core
  http: ^1.2.2
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.3.2
  flutter_blue_plus: ^1.35.5
  async: ^2.11.0
  mqtt5_client: ^4.17.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  plugin:
    platforms:
      android:
        package: dev.eixam.connect.flutter
        pluginClass: EixamConnectFlutterPlugin
      ios:
        pluginClass: EixamConnectFlutterPlugin
